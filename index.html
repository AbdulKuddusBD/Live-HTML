<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodePlay - লাইভ HTML কোড এডিটর</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- সাইডবার -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-code"></i>
                <span>CodePlay</span>
            </div>
            
            <nav class="nav-menu">
                <button class="nav-item active" data-tab="html">
                    <i class="fab fa-html5"></i>
                    <span>HTML</span>
                </button>
                <button class="nav-item" data-tab="css">
                    <i class="fab fa-css3-alt"></i>
                    <span>CSS</span>
                </button>
                <button class="nav-item" data-tab="js">
                    <i class="fab fa-js"></i>
                    <span>JavaScript</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="theme-toggle">
                    <i class="fas fa-moon"></i>
                    <span>ডার্ক মোড</span>
                    <label class="switch">
                        <input type="checkbox" id="themeToggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </aside>

        <!-- মূল কন্টেন্ট -->
        <main class="main-content">
            <!-- টুলবার -->
            <div class="toolbar">
                <div class="toolbar-left">
                    <button class="tool-btn" id="newBtn" title="নতুন ফাইল (Ctrl+N)">
                        <i class="fas fa-file"></i>
                        <span>নতুন</span>
                    </button>
                    <button class="tool-btn" id="saveBtn" title="সংরক্ষণ (Ctrl+S)">
                        <i class="fas fa-save"></i>
                        <span>সংরক্ষণ</span>
                    </button>
                    <button class="tool-btn" id="loadBtn" title="লোড (Ctrl+O)">
                        <i class="fas fa-folder-open"></i>
                        <span>ওপেন</span>
                    </button>
                    <button class="tool-btn" id="exportBtn" title="এক্সপোর্ট (Ctrl+E)">
                        <i class="fas fa-download"></i>
                        <span>এক্সপোর্ট</span>
                    </button>
                </div>
                
                <div class="toolbar-center">
                    <div class="live-indicator">
                        <span class="live-dot"></span>
                        <span>লাইভ প্রিভিউ</span>
                    </div>
                </div>
                
                <div class="toolbar-right">
                    <button class="tool-btn" id="fullscreenBtn" title="ফুলস্ক্রিন (F11)">
                        <i class="fas fa-expand"></i>
                    </button>
                    <button class="tool-btn" id="settingsBtn" title="সেটিংস">
                        <i class="fas fa-cog"></i>
                    </button>
                </div>
            </div>

            <!-- এডিটর ও প্রিভিউ কন্টেইনার -->
            <div class="workspace">
                <!-- এডিটর সেকশন -->
                <div class="editor-section">
                    <div class="editor-header">
                        <div class="file-tabs">
                            <div class="file-tab active" data-file="html">
                                <i class="fab fa-html5"></i>
                                <span>index.html</span>
                                <i class="fas fa-times close-tab"></i>
                            </div>
                            <div class="file-tab" data-file="css">
                                <i class="fab fa-css3-alt"></i>
                                <span>style.css</span>
                                <i class="fas fa-times close-tab"></i>
                            </div>
                            <div class="file-tab" data-file="js">
                                <i class="fab fa-js"></i>
                                <span>script.js</span>
                                <i class="fas fa-times close-tab"></i>
                            </div>
                        </div>
                        <div class="editor-actions">
                            <button class="editor-action" id="formatBtn" title="ফরম্যাট কোড">
                                <i class="fas fa-magic"></i>
                            </button>
                            <button class="editor-action" id="undoBtn" title="আনডু (Ctrl+Z)">
                                <i class="fas fa-undo"></i>
                            </button>
                            <button class="editor-action" id="redoBtn" title="রিডু (Ctrl+Y)">
                                <i class="fas fa-redo"></i>
                            </button>
                        </div>
                    </div>

                    <div class="editor-container">
                        <textarea id="htmlEditor" class="code-editor active" spellcheck="false" placeholder="<!-- আপনার HTML কোড লিখুন -->">&lt;!DOCTYPE html&gt;
&lt;html lang="bn"&gt;
&lt;head&gt;
    &lt;meta charset="UTF-8"&gt;
    &lt;meta name="viewport" content="width=device-width, initial-scale=1.0"&gt;
    &lt;title&gt;CodePlay ডেমো&lt;/title&gt;
&lt;/head&gt;
&lt;body&gt;
    &lt;div class="container"&gt;
        &lt;h1&gt;🎨 CodePlay-তে স্বাগতম&lt;/h1&gt;
        &lt;p&gt;এটি একটি ডেমো HTML টেমপ্লেট&lt;/p&gt;
        
        &lt;div class="card"&gt;
            &lt;h2&gt;ইন্টারেক্টিভ ডেমো&lt;/h2&gt;
            &lt;p id="demoText"&gt;নিচের বাটনে ক্লিক করুন&lt;/p&gt;
            &lt;button onclick="updateContent()" class="btn"&gt;
                &lt;i class="fas fa-magic"&gt;&lt;/i&gt;
                ক্লিক করুন
            &lt;/button&gt;
        &lt;/div&gt;

        &lt;div class="features"&gt;
            &lt;div class="feature"&gt;
                &lt;i class="fas fa-bolt"&gt;&lt;/i&gt;
                &lt;h3&gt;লাইভ প্রিভিউ&lt;/h3&gt;
            &lt;/div&gt;
            &lt;div class="feature"&gt;
                &lt;i class="fas fa-paint-brush"&gt;&lt;/i&gt;
                &lt;h3&gt;CSS সাপোর্ট&lt;/h3&gt;
            &lt;/div&gt;
            &lt;div class="feature"&gt;
                &lt;i class="fas fa-code"&gt;&lt;/i&gt;
                &lt;h3&gt;JavaScript&lt;/h3&gt;
            &lt;/div&gt;
        &lt;/div&gt;
    &lt;/div&gt;
&lt;/body&gt;
&lt;/html&gt;</textarea>
                        
                        <textarea id="cssEditor" class="code-editor" spellcheck="false" placeholder="/* আপনার CSS কোড লিখুন */">* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    max-width: 800px;
    padding: 40px;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    text-align: center;
}

h1 {
    color: #2d3748;
    margin-bottom: 20px;
    font-size: 2.5em;
}

.card {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 30px;
    border-radius: 15px;
    margin: 30px 0;
}

.btn {
    background: white;
    color: #764ba2;
    border: none;
    padding: 12px 30px;
    border-radius: 25px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 15px;
}

.btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
}

.btn i {
    margin-right: 8px;
}

.features {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-top: 30px;
}

.feature {
    padding: 20px;
    background: #f7fafc;
    border-radius: 10px;
    transition: all 0.3s;
}

.feature:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
}

.feature i {
    font-size: 30px;
    color: #667eea;
    margin-bottom: 10px;
}

@media (max-width: 600px) {
    .features {
        grid-template-columns: 1fr;
    }
}</textarea>
                        
                        <textarea id="jsEditor" class="code-editor" spellcheck="false" placeholder="// আপনার JavaScript কোড লিখুন">// ডেমো ফাংশন
function updateContent() {
    const demoText = document.getElementById('demoText');
    const texts = [
        '🎉 আপনি বাটন ক্লিক করেছেন!',
        '🌟 CodePlay ব্যবহার করার জন্য ধন্যবাদ',
        '💡 আপনি এখন JavaScript শিখছেন',
        '🚀 লাইভ প্রিভিউ অটোমেটিক আপডেট হয়'
    ];
    
    const randomText = texts[Math.floor(Math.random() * texts.length)];
    demoText.textContent = randomText;
    
    // এনিমেশন ইফেক্ট
    demoText.style.animation = 'none';
    demoText.offsetHeight; // রিফ্লো ফোর্স করুন
    demoText.style.animation = 'pulse 0.5s ease';
}

// অ্যানিমেশন যোগ করুন
const style = document.createElement('style');
style.textContent = `
    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
    }
`;
document.head.appendChild(style);

// কনসোল মেসেজ
console.log('✅ JavaScript সফলভাবে লোড হয়েছে!');
console.log('📝 লাইভ এডিটর ব্যবহার করার জন্য ধন্যবাদ');</textarea>
                    </div>

                    <div class="editor-statusbar">
                        <span id="cursorPosition">Ln 1, Col 1</span>
                        <span id="fileSize">0 B</span>
                        <span id="wordCount">0 শব্দ</span>
                    </div>
                </div>

                <!-- প্রিভিউ সেকশন -->
                <div class="preview-section">
                    <div class="preview-toolbar">
                        <div class="preview-tabs">
                            <button class="preview-tab active" data-view="desktop">
                                <i class="fas fa-desktop"></i>
                            </button>
                            <button class="preview-tab" data-view="tablet">
                                <i class="fas fa-tablet-alt"></i>
                            </button>
                            <button class="preview-tab" data-view="mobile">
                                <i class="fas fa-mobile-alt"></i>
                            </button>
                        </div>
                        <div class="preview-actions">
                            <button class="preview-action" id="refreshPreview" title="রিফ্রেশ (Ctrl+R)">
                                <i class="fas fa-sync-alt"></i>
                            </button>
                            <button class="preview-action" id="openInNew" title="নতুন উইন্ডোতে খুলুন">
                                <i class="fas fa-external-link-alt"></i>
                            </button>
                        </div>
                    </div>

                    <div class="preview-container" id="previewContainer">
                        <iframe id="livePreview" title="Live Preview" sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-modals"></iframe>
                    </div>

                    <div class="console-panel">
                        <div class="console-header">
                            <i class="fas fa-terminal"></i>
                            <span>কনসোল</span>
                            <button class="clear-console" id="clearConsole">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                        <div class="console-output" id="consoleOutput">
                            <div class="console-log">> CodePlay রেডি ✅</div>
                            <div class="console-log">> লাইভ প্রিভিউ অটোমেটিক আপডেট হচ্ছে...</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- মডাল -->
    <div class="modal" id="saveModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>সংরক্ষণ করুন</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <input type="text" placeholder="ফাইলের নাম" id="fileName">
                <select id="fileFormat">
                    <option value="html">HTML ফাইল</option>
                    <option value="zip">ZIP আর্কাইভ</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="modal-btn cancel">বাতিল</button>
                <button class="modal-btn save">সংরক্ষণ</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
